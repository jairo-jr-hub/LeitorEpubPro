<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- theme-color será atualizado dinamicamente conforme o tema -->
  <meta name="theme-color" content="#ffffff">
  <title>Leitor EPUB</title>
  
  <!-- Pré-conexão para Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Fontes para personalização de leitura -->
  <link href="https://fonts.googleapis.com/css2?family=Literata:opsz@7..72&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Estilos principais -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ======================== -->
  <!-- TELA INICIAL DE UPLOAD   -->
  <!-- ======================== -->
  <div id="upload-screen" class="upload-screen">
    <div class="upload-content">
      <div class="upload-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <polyline points="12 6 12 14"/>
          <polyline points="8 10 12 6 16 10"/>
        </svg>
      </div>
      <h2>Selecione um arquivo EPUB</h2>
      <p>Arraste e solte ou clique para escolher</p>
      <!-- Input oculto para seleção de arquivo -->
      <input type="file" id="file-input" accept=".epub">
      <button id="file-select-btn" class="primary-btn">Escolher arquivo</button>
    </div>
  </div>

  <!-- ======================== -->
  <!-- LEITOR PRINCIPAL         -->
  <!-- ======================== -->
  <div id="reader-container" class="reader-container hidden">
    
    <!-- Barra superior -->
    <header id="top-bar" class="top-bar">
      <button id="close-btn" class="icon-btn" aria-label="Fechar livro">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <span id="book-title" class="book-title">Carregando...</span>
      <button id="menu-btn" class="icon-btn" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="5" r="1.5"/>
          <circle cx="12" cy="12" r="1.5"/>
          <circle cx="12" cy="19" r="1.5"/>
        </svg>
      </button>
    </header>

    <!-- Área de renderização do EPUB -->
    <div id="viewer" class="viewer"></div>

    <!-- Barra inferior com progresso e marcador -->
    <footer id="bottom-bar" class="bottom-bar">
      <div class="progress-slider-container">
        <span id="progress-label" class="progress-label">0%</span>
        <input type="range" id="progress-slider" min="0" max="100" value="0" step="0.1" title="Progresso">
        <span id="page-info" class="page-info">Pág. 0/0</span>
      </div>
      <!-- Botão de marcador (azul, conforme Google Play Livros) -->
      <button id="bookmark-toggle-btn" class="icon-btn bookmark-btn" aria-label="Marcador">
        <svg id="bookmark-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2196F3" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
    </footer>
  </div>

  <!-- ======================== -->
  <!-- PAINEL DE CONFIGURAÇÕES  -->
  <!-- ======================== -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-backdrop"></div>
    <div class="settings-content">
      <div class="settings-header">
        <h3>Configurações</h3>
        <button id="close-settings" class="icon-btn" aria-label="Fechar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Abas de configuração -->
      <div class="settings-tabs" role="tablist">
        <button class="tab active" data-tab="themes">Temas</button>
        <button class="tab" data-tab="text">Texto</button>
        <button class="tab" data-tab="chapters">Capítulos</button>
        <button class="tab" data-tab="bookmarks">Marcadores</button>
      </div>

      <!-- Conteúdo da aba: Temas -->
      <div class="tab-content active" id="tab-themes">
        <div class="theme-options">
          <button class="theme-card active" data-theme="clear">
            <div class="theme-preview" style="background:#fff; color:#000;">Claro</div>
            <span>Claro</span>
          </button>
          <button class="theme-card" data-theme="dark">
            <div class="theme-preview" style="background:#121212; color:#e0e0e0;">Escuro</div>
            <span>Escuro</span>
          </button>
          <button class="theme-card" data-theme="sepia">
            <div class="theme-preview" style="background:#f4ecd8; color:#3e3a37;">Sépia</div>
            <span>Sépia</span>
          </button>
        </div>
      </div>

      <!-- Conteúdo da aba: Texto -->
      <div class="tab-content" id="tab-text">
        <div class="setting-group">
          <label>Fonte</label>
          <select id="font-family-select">
            <option value="Literata">Literata</option>
            <option value="Merriweather">Merriweather</option>
            <option value="Lora">Lora</option>
            <option value="Roboto">Roboto</option>
            <option value="serif">Serif (padrão)</option>
          </select>
        </div>
        <div class="setting-group">
          <label>Tamanho: <span id="font-size-value">100%</span></label>
          <input type="range" id="font-size-slider" min="80" max="200" value="100" step="1">
        </div>
        <div class="setting-group">
          <label>Espaçamento entre linhas: <span id="line-height-value">1.5</span></label>
          <input type="range" id="line-height-slider" min="1" max="2.5" value="1.5" step="0.05">
        </div>
        <div class="setting-group">
          <label>Espaçamento entre palavras: <span id="word-spacing-value">0px</span></label>
          <input type="range" id="word-spacing-slider" min="0" max="10" value="0" step="0.5">
        </div>
        <div class="setting-group">
          <label>Margens laterais: <span id="margin-value">5%</span></label>
          <input type="range" id="margin-slider" min="0" max="20" value="5" step="1">
        </div>
        <div class="setting-group">
          <label>Justificação</label>
          <select id="justify-select">
            <option value="justify">Justificado</option>
            <option value="left">Esquerda</option>
          </select>
        </div>
        <!-- Controles específicos para mobile -->
        <div class="setting-group mobile-respiro">
          <label>Respiro superior (mobile): <span id="top-padding-value">0px</span></label>
          <input type="range" id="top-padding-slider" min="0" max="80" value="0" step="1">
        </div>
        <div class="setting-group mobile-respiro">
          <label>Respiro inferior (mobile): <span id="bottom-padding-value">0px</span></label>
          <input type="range" id="bottom-padding-slider" min="0" max="80" value="0" step="1">
        </div>
      </div>

      <!-- Conteúdo da aba: Capítulos -->
      <div class="tab-content" id="tab-chapters">
        <ul id="toc-list" class="toc-list"></ul>
      </div>

      <!-- Conteúdo da aba: Marcadores -->
      <div class="tab-content" id="tab-bookmarks">
        <button id="add-manual-bookmark" class="secondary-btn">Salvar posição atual</button>
        <ul id="bookmark-list" class="bookmark-list"></ul>
      </div>
    </div>
  </div>

  <!-- ======================== -->
  <!-- DEPENDÊNCIA: EPUB.js     -->
  <!-- ======================== -->
  <!-- Usando versão 0.3.93, estável e amplamente suportada -->
  <script src="https://unpkg.com/epubjs@0.3.93/dist/epub.min.js"></script>
  
  <!-- Lógica principal do leitor -->
  <script src="app.js"></script>
</body>
</html>
